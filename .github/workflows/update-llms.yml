name: Auto Update llms.txt Recent Posts

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at midnight UTC
  workflow_dispatch:        # Manual trigger via GitHub Actions tab

jobs:
  update-blog-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Latest Blogger RSS and Update llms.txt
        run: |
          curl -s "https://www.itsiptime.com/feeds/posts/default?alt=rss" > feed.xml

          python3 -c "
          import xml.etree.ElementTree as ET

          try:
              root = ET.parse('feed.xml').getroot()
              items = root.findall('.//item')[:4]
              posts = []

              for item in items:
                  title = item.find('title').text.replace('\"', \"'\").strip()
                  link = item.find('link').text.strip()
                  posts.append(f'- [{title}]({link}): Review a recent court judgment update.')

              # llms_template.txt is the source of truth for static sections
              with open('llms_template.txt', 'r') as f:
                  content = f.read()

              start_marker = '## Recent Court Judgment Breakdowns\n'
              end_marker = '\n## IP Law Case Analysis (By Category)'

              if start_marker not in content or end_marker not in content:
                  print('Error: Section headers not found in llms_template.txt.')
                  exit(1)

              before = content.split(start_marker)[0]
              after = content.split(end_marker)[1]
              new_posts_block = '\n'.join(posts) + '\n\n'
              final_text = f'{before}{start_marker}{new_posts_block}{end_marker}{after}'

              # Update the template (so next week's run starts from fresh static sections)
              with open('llms_template.txt', 'w') as f:
                  f.write(final_text)

              # Write directly to llms.txt — served by GitHub Pages at ai.itsiptime.com/llms.txt
              with open('llms.txt', 'w') as f:
                  f.write(final_text)

              print('Successfully updated llms.txt and llms_template.txt.')

          except Exception as e:
              print(f'Script error: {str(e)}')
              exit(1)
          "

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: updated recent blog posts in llms.txt"
